<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoClip AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>AutoClip AI</h1>
<p>Create clips from YouTube videos instantly</p>
</header>

<div class="container">

<input id="videoURL" placeholder="Paste YouTube video link">

<div class="time-controls">
<input id="startTime" placeholder="Start time (seconds)">
<input id="endTime" placeholder="End time (seconds)">
</div>

<button onclick="generateClip()">Generate Clip</button>

<div id="player"></div>

<button id="downloadBtn" onclick="downloadClip()">Download Clip</button>

</div>

<script src="script.js"></script>

</body>
</html>
